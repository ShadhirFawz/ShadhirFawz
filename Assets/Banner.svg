<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title" role="img">
  <title id="title">SHADHIR_FAWZ Banner</title>
  
  <!-- Background Gradient (Dark Blue-Purple to Red-Orange) -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0f3d" />
      <stop offset="50%" stop-color="#4a1d5e" />
      <stop offset="100%" stop-color="#c23d3d" />
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bgGradient)" rx="20" ry="20" />

  <!-- Top-Left Decorative Lines -->
  <g opacity="0.7">
    <line x1="80" y1="60" x2="220" y2="20" stroke="#f4a261" stroke-width="3" />
    <line x1="70" y1="75" x2="210" y2="35" stroke="#f4a261" stroke-width="3" />
    <line x1="60" y1="90" x2="200" y2="50" stroke="#f4a261" stroke-width="3" />
    <line x1="50" y1="105" x2="190" y2="65" stroke="#f4a261" stroke-width="3" />
  </g>

  <!-- Bottom-Right Decorative Lines -->
  <g opacity="0.7">
    <line x1="980" y1="320" x2="1140" y2="360" stroke="#f4a261" stroke-width="3" />
    <line x1="970" y1="305" x2="1130" y2="345" stroke="#f4a261" stroke-width="3" />
    <line x1="960" y1="290" x2="1120" y2="330" stroke="#f4a261" stroke-width="3" />
    <line x1="950" y1="275" x2="1110" y2="315" stroke="#f4a261" stroke-width="3" />
  </g>

  <!-- Main Text Box -->
  <rect 
    x="380" 
    y="120" 
    width="440" 
    height="95" 
    rx="12" 
    ry="12" 
    fill="none" 
    stroke="#ffffff" 
    stroke-width="6" />

  <!-- Name Text -->
  <text 
    x="600" 
    y="185" 
    text-anchor="middle" 
    font-family="Arial Black, sans-serif" 
    font-size="58" 
    font-weight="900" 
    fill="#ffffff" 
    letter-spacing="4px" 
    paint-order="stroke fill" 
    stroke="#c026d3" 
    stroke-width="4">
    SHADHIR_FAWZ
  </text>

  <!-- Divider Line with Diamond -->
  <line 
    x1="380" 
    y1="235" 
    x2="820" 
    y2="235" 
    stroke="#ffffff" 
    stroke-width="3" />

  <!-- Diamond Marker -->
  <polygon 
    points="375,235 380,230 385,235 380,240" 
    fill="#ffffff" />

  <!-- Email and GitHub in the same line -->
  <g transform="translate(380,270)">
    <!-- Email Icon -->
    <rect x="0" y="0" width="28" height="22" rx="2" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <path d="M4 7 L14 14 L24 7" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    
    <!-- Email Text -->
    <text x="45" y="18" font-family="Arial, sans-serif" font-size="19" fill="#e0e0e0" letter-spacing="0.5px">
      Shadhifawz19@gmail.com
    </text>

    <!-- Separator Line -->
    <line x1="310" y1="4" x2="310" y2="20" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>

    <!-- GitHub Icon (Left of GitHub username) -->
    <g transform="translate(330, -2)">
      <path 
        d="M12 2C6.48 2 2 6.59 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.09.68-.22.68-.48 0-.24-.01-.87-.01-1.7-2.78.61-3.37-1.17-3.37-1.17-.45-1.15-1.1-1.46-1.1-1.46-.9-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.88 1.52 2.32 1.08 2.88.83.09-.64.35-1.08.63-1.33-2.21-.25-4.54-1.11-4.54-4.93 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.03 1.58-.43 3.27-.43 4.85 0 1.91-1.3 2.75-1.03 2.75-1.03.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.83-2.34 4.68-4.57 4.93.36.31.68.92.68 1.85 0 1.34-.01 2.42-.01 2.75 0 .26.18.58.69.48C19.12 20.62 22 16.78 22 12.25 22 6.59 17.52 2 12 2z" 
        fill="#e2e8f0" 
        transform="scale(1.1)"/>
    </g>

    <!-- GitHub Username -->
    <text x="360" y="18" font-family="Inter, Arial, sans-serif" font-size="17.5" fill="#cbd5e1" letter-spacing="0.4px">
      ShadhirFawz
    </text>
